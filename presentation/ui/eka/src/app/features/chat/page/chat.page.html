<!-- chat.component.html -->
<div class="chat-container">
  <div class="messages">
    <div *ngFor="let msg of messages()" [ngClass]="msg.role">
      <p>{{ msg.content }}</p>
    </div>
  </div>

  <div class="input-area">
    <select [(ngModel)]="selectedRole">
      <option value="employee">Employee</option>
      <option value="admin">Admin</option>
    </select>
    <input [(ngModel)]="userInput" placeholder="Ask Me..." />
    <button (click)="sendMessage()">Send</button>
  </div>

  <div class="kb-update">
    <textarea [(ngModel)]="KbUpdate" placeholder="Update KB article..."></textarea>
    <button (click)="updateKB()">Update KB</button>
  </div>
</div>
